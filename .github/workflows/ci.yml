name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || 'release-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, Test & Build
    uses: sisques-labs/workflows/.github/workflows/node-ci.yml@main
    with:
      node_version: "24"
      test_command: "test:cov"

  release:
    name: Release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: sisques-labs/workflows/.github/workflows/node-release.yml@main
    secrets: inherit
    with:
      node_version: "20"
      build_command: "build"
