name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_type:
        description: Release type
        required: true
        type: choice
        default: stable
        options:
          - stable
          - alpha
          - beta

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [ "${{ inputs.release_type }}" = "stable" ]; then
            NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version)
          else
            NEW_VERSION=$(npm version pre${{ inputs.version }} --preid=${{ inputs.release_type }} --no-git-tag-version)
          fi
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Update changelog
        run: pnpm dlx git-cliff --offline --tag ${{ steps.bump.outputs.version }} -o CHANGELOG.md

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: |
          if [ "${{ inputs.release_type }}" = "stable" ]; then
            pnpm publish --no-git-checks
          else
            pnpm publish --no-git-checks --tag ${{ inputs.release_type }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write release notes
        run: pnpm dlx git-cliff --offline --unreleased --tag ${{ steps.bump.outputs.version }} --strip header -o RELEASE_NOTES.md

      - name: Commit, tag & push
        run: |
          git add package.json pnpm-lock.yaml CHANGELOG.md
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"
          git tag ${{ steps.bump.outputs.version }}
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ inputs.release_type != 'stable' }}
